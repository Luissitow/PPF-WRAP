<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" role="img" aria-label="Imagen de ejemplo">
  <defs>
    <linearGradient id="bgs6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#232323"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="bodys6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="hsl(174 45% 32%)"/>
      <stop offset="100%" stop-color="hsl(174 50% 16%)"/>
    </linearGradient>
    <radialGradient id="glows6" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="600" height="600" fill="url(#bgs6)"/>
  <rect width="600" height="600" fill="url(#glows6)"/>

  <g stroke="#343444" stroke-width="1" opacity="0.35">
    <line x1="0" y1="0" x2="0" y2="600"/>
    <line x1="100" y1="0" x2="100" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/>
    <line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="0" y1="0" x2="600" y2="0"/>
    <line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="400" x2="600" y2="400"/>
    <line x1="0" y1="500" x2="600" y2="500"/>
    <line x1="0" y1="600" x2="600" y2="600"/>
  </g>

  <!-- Carrocería -->
  <g transform="translate(42.0,160.5) scale(0.7701)">
    <path d="M18 210 C10 150 60 138 108 130 L188 62 C206 46 234 38 268 38 L400 38
             C440 38 470 48 492 68 L556 128 C606 136 646 152 650 208
             C652 238 640 250 612 250 L56 250 C26 250 20 236 18 210 Z"
          fill="url(#bodys6)" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="2"/>
    <!-- Cristales -->
    <path d="M206 72 C222 58 244 54 268 54 L330 54 L330 126 L160 126 Z" fill="#1a1a1a" opacity="0.85"/>
    <path d="M356 54 L398 54 C430 54 456 62 474 78 L520 126 L356 126 Z" fill="#1a1a1a" opacity="0.85"/>
    <!-- Reflejo de carrocería -->
    <path d="M30 186 L636 186" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="2"/>
    <!-- Ruedas -->
    <g fill="#1a1a1a" stroke="#FFFFFF" stroke-opacity="0.65" stroke-width="3">
      <circle cx="164" cy="250" r="52"/>
      <circle cx="510" cy="250" r="52"/>
    </g>
    <g fill="none" stroke="#8a8aa0" stroke-opacity="0.55" stroke-width="2">
      <circle cx="164" cy="250" r="24"/>
      <circle cx="510" cy="250" r="24"/>
    </g>
  </g>

  <text x="300" y="516" text-anchor="middle" fill="#8a8aa0" font-family="ui-monospace, monospace"
